# =============================================================================
# OneManCompany — Docker Compose for persistent deployment
# =============================================================================
#
# CRITICAL: OMC uses Path.cwd() to locate data (see core/config.py).
# Since WORKDIR is /app, all persistent state lives at /app/.onemancompany/.
# Mount a host volume there to survive container rebuilds.
#
# First run will trigger the onboarding wizard (onemancompany-init).
# Subsequent runs will reuse the persisted data.
# =============================================================================

services:
  onemancompany:
    build: .
    container_name: omc-sandbox
    ports:
      - "8000:8000"
    volumes:
      # ──────────────────────────────────────────────────────────────────────
      # PERSISTENT STATE (required — all data lives here)
      # Mount this to preserve everything across container rebuilds:
      #   .env, config.yaml, company/, logs/
      # If omitted, init wizard runs each time and data is lost on removal.
      # ──────────────────────────────────────────────────────────────────────
      - /nfs/dockernfs/one-man-company/config:/app/.onemancompany

      # ──────────────────────────────────────────────────────────────────────
      # OPTIONAL: Shared workspace for agent file output
      # Agents write project files under .onemancompany/company/business/
      # by default. Only mount this if you have tooling that reads /app/workspace.
      # ──────────────────────────────────────────────────────────────────────
      # - /nfs/dockernfs/one-man-company/workspace:/app/workspace

    environment:
      # ──────────────────────────────────────────────────────────────────────
      # LLM provider configuration
      # These are fallbacks — if .onemancompany/.env exists (on the mounted
      # volume), values there take precedence (loaded with override=False).
      # ──────────────────────────────────────────────────────────────────────

      # OpenAI-compatible endpoint (for local proxies like llama-swap)
      # - OPENAI_API_BASE=http://<LLAMA_SWAP_IP>:<PORT>/v1
      # - OPENAI_API_KEY=dummy-key-for-local

      # Or use OpenRouter as the provider
      # - OPENROUTER_API_KEY=sk-or-v1-your-key-here

      # Debug logging (sets log level to DEBUG; requires "1", not "true")
      # - OMC_DEBUG=1

      # Server bind (optional — defaults in pyproject.toml settings)
      # - HOST=0.0.0.0
      # - PORT=8000

    restart: unless-stopped

    # Optional: Limit resources to ensure it doesn't spike your cluster
    deploy:
      resources:
        limits:
          memory: 4G
