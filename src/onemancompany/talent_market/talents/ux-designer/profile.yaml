id: ux-designer
name: UX Designer
description: >
  UX designer specializing in user research, wireframing, and usability testing.
  Creates intuitive, accessible interfaces through evidence-based design decisions.
  Conducts user interviews, creates wireframes and prototypes, and validates
  designs through iterative usability testing.
role: Designer
